name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install

      - name: Build binaries
        run: bun run build:all

      - name: Sign binaries
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          for bin in dist/apollo-macos-arm64 dist/apollo-macos-x64 dist/apollo-linux-x64 dist/apollo-windows-x64.exe; do
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 \
              --pinentry-mode loopback --detach-sign --armor "$bin"
          done

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            dist/apollo-macos-arm64
            dist/apollo-macos-arm64.asc
            dist/apollo-macos-x64
            dist/apollo-macos-x64.asc
            dist/apollo-linux-x64
            dist/apollo-linux-x64.asc
            dist/apollo-windows-x64.exe
            dist/apollo-windows-x64.exe.asc

  update-homebrew-tap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: apolloio/homebrew-apollo-io-cli
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF_NAME#v}
          BASE="https://github.com/apolloio/apollo-io-cli/releases/download/${GITHUB_REF_NAME}"
          for bin in apollo-macos-arm64 apollo-macos-x64 apollo-linux-x64; do
            curl -fsSL "${BASE}/${bin}" -o "/tmp/${bin}"
          done
          ARM64_SHA=$(shasum -a 256 /tmp/apollo-macos-arm64 | awk '{print $1}')
          X64_SHA=$(shasum -a 256 /tmp/apollo-macos-x64 | awk '{print $1}')
          LINUX_X64_SHA=$(shasum -a 256 /tmp/apollo-linux-x64 | awk '{print $1}')
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/apollo-io-cli.rb
          sed -i "/apollo-macos-arm64/{n;s/sha256 \".*\"/sha256 \"${ARM64_SHA}\"/}" Formula/apollo-io-cli.rb
          sed -i "/apollo-macos-x64/{n;s/sha256 \".*\"/sha256 \"${X64_SHA}\"/}" Formula/apollo-io-cli.rb
          sed -i "/apollo-linux-x64/{n;s/sha256 \".*\"/sha256 \"${LINUX_X64_SHA}\"/}" Formula/apollo-io-cli.rb

      - name: Open pull request on tap repo
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          branch: bot/update-${{ github.ref_name }}
          commit-message: "Update apollo-io-cli to ${{ github.ref_name }}"
          title: "Update apollo-io-cli to ${{ github.ref_name }}"
          add-paths: Formula/apollo-io-cli.rb
          body: |
            Automated formula bump triggered by release ${{ github.ref_name }}.

            Updates version and sha256 for all three release assets:
            - `apollo-macos-arm64`
            - `apollo-macos-x64`
            - `apollo-linux-x64`
